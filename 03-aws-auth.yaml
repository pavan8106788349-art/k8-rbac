apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system

data:
  mapRoles: |
    - rolearn: arn:aws:iam::593300579669:role/<NODE-INSTANCE-ROLE>
      username: system:node:{{EC2PrivateDNSName}}
      groups:
        - system:bootstrappers
        - system:nodes

  mapUsers: |
    - userarn: arn:aws:iam::593300579669:user/Suresh
      username: suresh
      groups:
        - system:masters

    - userarn: arn:aws:iam::593300579669:user/Ramesh
      username: ramesh
      groups:
        - roboshop-admin